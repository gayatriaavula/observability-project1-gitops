# Deploys Prometheus + Grafana + Alertmanager via the upstream Helm chart,
# configured with our values in the app repo's k8s/monitoring/kube-prometheus-stack-values.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "61.x"
      helm:
        skipCrds: true
        valueFiles:
          - $values/k8s/monitoring/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/gayatriaavula/observability-project1.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The prometheus-operator CRDs (Prometheus, Alertmanager, etc.) exceed
      # the 262144-byte annotation limit under Argo CD's own apply path, so
      # they're installed once directly (kubectl apply --server-side) instead
      # of through this Application -- see the app repo's README. skipCrds
      # above keeps this release from fighting that out-of-band install.
      - ServerSideApply=true
