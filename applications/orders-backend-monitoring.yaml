# ServiceMonitor + PrometheusRule for orders-backend. Sync this after
# kube-prometheus-stack.yaml, since it depends on the CRDs that chart installs.
# k8s manifests live in the app repo, not here -- see source.repoURL below.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-backend-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/gayatriaavula/observability-project1.git
    targetRevision: main
    path: k8s/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: orders-backend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
