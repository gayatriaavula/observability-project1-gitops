apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- serviceaccount.yaml
- configmap.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
- pdb.yaml
- gateway.yaml
- virtualservice.yaml
- destinationrule.yaml
- peerauthentication.yaml

# CI in observability-project1 overwrites the tag on every build (see
# .github/workflows/ci-cd.yml there), committing the change to THIS repo so
# Argo CD picks it up and syncs the new image.
images:
- name: orders-backend
  newName: 866934333672.dkr.ecr.us-east-1.amazonaws.com/orders-backend-dev
  newTag: 2c5f8d0854be88f2629e8471309498e67411165e
