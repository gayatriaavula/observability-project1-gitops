# Requires mTLS for connections to orders-backend pods, with one
# exception: port 8080 (the app's HTTP/metrics port) stays PERMISSIVE
# because Prometheus lives outside the mesh (no Envoy sidecar) and scrapes
# /metrics in plain HTTP. Without that exception, STRICT mTLS causes the
# sidecar to reset every scrape ("connection reset by peer") and the
# orders-service target shows as permanently down.
# portLevelMtls requires a workload selector, so this is scoped to
# orders-backend specifically rather than being a namespace-wide default.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: orders-backend
  namespace: orders-backend
spec:
  selector:
    matchLabels:
      app: orders-backend
  mtls:
    mode: STRICT
  portLevelMtls:
    8080:
      mode: PERMISSIVE
