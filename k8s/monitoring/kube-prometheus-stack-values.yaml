# Helm values for prometheus-community/kube-prometheus-stack, deployed via
# the Argo CD Application in applications/kube-prometheus-stack.yaml in the
# observability-project1-gitops repo.
alertmanager:
  config:
    route:
      receiver: "slack"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
      - name: "slack"
        slack_configs:
          # Read from the mounted Secret below rather than a plaintext value
          # here, so the real webhook URL never has to be committed to git.
          # Create it once per cluster:
          #   kubectl create secret generic alertmanager-slack-webhook \
          #     -n monitoring --from-literal=url=https://hooks.slack.com/services/...
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#orders-alerts"
            send_resolved: true
      # Required by the chart's own default Watchdog-silencing route, which
      # this values file otherwise overrides; omitting it fails validation
      # with "undefined receiver 'null' used in route".
      - name: "null"
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook

grafana:
  # An empty/unset adminPassword makes the chart generate a new random
  # password (and restart Grafana) on every sync. Point it at a stable
  # Secret created once per cluster instead:
  #   kubectl create secret generic grafana-admin-credentials -n monitoring \
  #     --from-literal=admin-user=admin --from-literal=admin-password=...
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsEnabled: true

prometheus:
  prometheusSpec:
    retention: 15d
    # Only scrape ServiceMonitors we explicitly label, rather than every
    # ServiceMonitor cluster-wide.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        release: kube-prometheus-stack
