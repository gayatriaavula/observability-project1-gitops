# App-of-apps: apply only this one manifest and Argo CD will discover and
# create the three Applications in applications/ itself.
#   kubectl apply -f root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/gayatriaavula/observability-project1-gitops.git
    targetRevision: main
    path: applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
